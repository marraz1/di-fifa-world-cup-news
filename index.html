<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiFifaWorldCupNews</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header>
        <button class="hamburger" id="hamburger" aria-label="Atidaryti navigaciją">&#9776;</button>
        <div class="logo">
            <span class="ball">⚽</span>
            <span class="site-name">DiFifa<span class="highlight">WorldCupNews</span></span>
        </div>
        <div class="lang-switcher">
            <button id="btn-lt" class="lang-btn active" onclick="setLang('lt')">LT</button>
            <span class="lang-sep">|</span>
            <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <div class="app-shell">

        <nav class="sidenav" id="sidenav">

            <button class="nav-btn" id="nav-home" onclick="showView('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label" data-i18n="navHome">Pagrindinis</span>
      </button>

            <div class="sidenav-divider"></div>

            <div class="sidenav-section-label" data-lt="NAUJIENOS" data-en="NEWS">NAUJIENOS</div>
            <ul id="nav-naujienos" class="nav-reports-list"></ul>

            <div class="sidenav-divider"></div>

            <div class="sidenav-section-label" data-lt="PRAĖJUSIOS RUNGTYNĖS" data-en="RESULTS">PRAĖJUSIOS RUNGTYNĖS</div>
            <ul id="nav-rezultatai" class="nav-reports-list"></ul>

            <div class="sidenav-divider"></div>

            <div class="sidenav-section-label" data-lt="ATEINANČIOS RUNGTYNĖS" data-en="FIXTURES">ATEINANČIOS RUNGTYNĖS</div>
            <ul id="nav-rungtynes" class="nav-reports-list"></ul>

            <div class="sidenav-divider"></div>

            <div class="sidenav-section-label" data-lt="MEDIA" data-en="MEDIA">MEDIA</div>
            <ul id="nav-media" class="nav-reports-list"></ul>

        </nav>

        <div class="sidenav-overlay" id="sidenav-overlay"></div>

        <div class="content-area" id="content-area">

            <!-- ── Home / Dashboard view ── -->
            <div id="view-home" class="view active">
                <div class="home-inner">
                    <div id="dashboard-grid" class="dashboard-grid">
                        <p class="loading">Kraunama...</p>
                    </div>
                </div>
            </div>

            <!-- ── Report view (shared iframe for all types) ── -->
            <div id="view-report" class="view">
                <iframe id="report-frame" src="" frameborder="0" title="Ataskaita"></iframe>
            </div>

        </div>
    </div>

    <script>
        const TYPES = [{
            type: 'naujienos',
            navId: 'nav-naujienos',
            icon: '📰',
            labelLT: 'Naujienos',
            labelEN: 'News'
        }, {
            type: 'rezultatai',
            navId: 'nav-rezultatai',
            icon: '⚽',
            labelLT: 'Praėjusios Rungtynės',
            labelEN: 'Results'
        }, {
            type: 'rungtynes',
            navId: 'nav-rungtynes',
            icon: '📅',
            labelLT: 'Ateinančios Rungtynės',
            labelEN: 'Fixtures'
        }, {
            type: 'media',
            navId: 'nav-media',
            icon: '📸',
            labelLT: 'Media',
            labelEN: 'Media'
        }, ];

        const i18n = {
            lt: {
                loading: 'Kraunama...',
                noReport: 'Dar nėra įrašų.',
                loadError: 'Nepavyko įkelti ataskaitų.',
                openBtn: 'Atidaryti →',
                navHome: 'Pagrindinis',
                by: 'Autorius:',
            },
            en: {
                loading: 'Loading...',
                noReport: 'No entries yet.',
                loadError: 'Could not load reports.',
                openBtn: 'Open →',
                navHome: 'Home',
                by: 'by',
            }
        };

        let currentLang = localStorage.getItem('lang') || 'lt';
        let allReports = [];

        /* ── helpers ── */

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return currentLang === 'lt' ?
                d.toLocaleDateString('lt-LT', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                }) :
                d.toLocaleDateString('en-GB', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
        }

        function formatDateShort(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return currentLang === 'lt' ?
                d.toLocaleDateString('lt-LT', {
                    day: 'numeric',
                    month: 'short'
                }) :
                d.toLocaleDateString('en-GB', {
                    day: 'numeric',
                    month: 'short'
                });
        }

        function getTitle(r) {
            return (currentLang === 'en' && r.titleEN) ? r.titleEN : r.title;
        }

        function safeJson(r) {
            return JSON.stringify(r).replace(/</g, '\\u003c').replace(/'/g, '\\u0027');
        }

        function reportNavId(r) {
            return 'nav-r-' + r.file.replace(/[^a-z0-9]/gi, '-');
        }

        /* ── view management ── */

        function showView(name) {
            document.body.classList.remove('sidenav-open');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + name).classList.add('active');
            document.getElementById('nav-home').classList.toggle('active', name === 'home');
        }

        /* ── open a report in the iframe ── */

        function openReport(r) {
            const frame = document.getElementById('report-frame');
            frame.src = r.file;
            frame.onload = function() {
                try {
                    const doc = frame.contentDocument;
                    const hdr = doc.querySelector('.header');
                    const backBar = doc.querySelector('.back-bar');
                    if (hdr) hdr.style.display = 'none';
                    if (backBar) backBar.style.display = 'none';
                } catch (e) {}
            };
            showView('report');

            document.querySelectorAll('.nav-report-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(reportNavId(r));
            if (btn) btn.classList.add('active');
        }

        /* ── populate all 5 sidenav sections ── */

        function populateAllNavSections(reports) {
            TYPES.forEach(({
                type,
                navId
            }) => {
                const ul = document.getElementById(navId);
                ul.innerHTML = '';
                reports.filter(r => r.type === type).forEach(r => {
                    ul.appendChild(makeNavItem(r));
                });
            });
        }

        function makeNavItem(r) {
            const li = document.createElement('li');
            li.innerHTML =
                `<button class="nav-report-btn" id="${reportNavId(r)}"
            onclick='openReport(${safeJson(r)})'>
          <span class="nav-report-date">${formatDateShort(r.date)}</span>
          <span class="nav-report-title">${getTitle(r)}</span>
        </button>`;
            return li;
        }

        /* ── dashboard tiles ── */

        function renderDashboard(reports) {
            const grid = document.getElementById('dashboard-grid');
            const t = i18n[currentLang];

            if (reports.length === 0) {
                grid.innerHTML = '<p class="loading">' + t.noReport + '</p>';
                return;
            }

            grid.innerHTML = TYPES.map(({
                type,
                icon,
                labelLT,
                labelEN
            }) => {
                const label = currentLang === 'en' ? labelEN : labelLT;
                const entries = reports.filter(r => r.type === type);
                const latest = entries[0]; // already sorted newest-first

                if (!latest) {
                    return `<div class="dashboard-tile" style="cursor:default;opacity:0.4;">
            <div class="dashboard-tile-icon">${icon}</div>
            <div class="dashboard-tile-type">${label}</div>
            <div class="dashboard-tile-title">${t.noReport}</div>
          </div>`;
                }

                return `<div class="dashboard-tile" tabindex="0" role="button"
            onclick='openReport(${safeJson(latest)})'
            onkeydown="if(event.key==='Enter'||event.key===' ')openReport(${safeJson(latest)})">
          <div class="dashboard-tile-icon">${icon}</div>
          <div class="dashboard-tile-type">${label}</div>
          <div class="dashboard-tile-date">${formatDate(latest.date)}</div>
          <div class="dashboard-tile-title">${getTitle(latest)}</div>
          <div class="dashboard-tile-arrow">${t.openBtn}</div>
        </div>`;
            }).join('');
        }

        /* ── i18n ── */

        function updateStaticText() {
            const t = i18n[currentLang];
            document.getElementById('btn-lt').classList.toggle('active', currentLang === 'lt');
            document.getElementById('btn-en').classList.toggle('active', currentLang === 'en');
            document.documentElement.lang = currentLang;

            document.getElementById('nav-home').querySelector('.nav-label').textContent = t.navHome;

            document.querySelectorAll('.sidenav-section-label').forEach(el => {
                el.textContent = currentLang === 'en' ? el.dataset.en : el.dataset.lt;
            });

            if (allReports.length > 0) {
                populateAllNavSections(allReports);
                renderDashboard(allReports);
            }
        }

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            updateStaticText();
        }

        /* ── events ── */

        document.getElementById('hamburger').addEventListener('click', function() {
            document.body.classList.toggle('sidenav-open');
        });

        document.getElementById('sidenav-overlay').addEventListener('click', function() {
            document.body.classList.remove('sidenav-open');
        });

        /* ── bootstrap ── */

        fetch('data/reports.json')
            .then(r => r.json())
            .then(data => {
                allReports = data.sort((a, b) => b.date.localeCompare(a.date));
                updateStaticText();
                populateAllNavSections(allReports);
                renderDashboard(allReports);
            })
            .catch(() => {
                document.getElementById('dashboard-grid').innerHTML =
                    '<p class="loading">' + i18n[currentLang].loadError + '</p>';
            });

        updateStaticText();
        document.getElementById('nav-home').classList.add('active');
    </script>
</body>

</html>
